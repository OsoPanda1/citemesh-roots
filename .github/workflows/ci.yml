# ============================================================================
# GitHub Actions - CI/CD NOA-TAMV
# ============================================================================

name: NOA-TAMV CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --------------------------------------------------------------------------
  # Lint y Type Check
  # --------------------------------------------------------------------------
  lint-and-type-check:
    runs-on: ubuntu-latest
    name: Lint y Type Check
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  # --------------------------------------------------------------------------
  # Tests
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    name: Tests
    needs: lint-and-type-check
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm run test

      - name: Subir coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # --------------------------------------------------------------------------
  # Build
  # --------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    name: Build
    needs: test
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Subir build
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/

  # --------------------------------------------------------------------------
  # Docker Build y Push
  # --------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    name: Docker Build y Push
    needs: build
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            latest

      - name: Build y push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Deploy
  # --------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configurar credenciales
        run: |
          # Configurar credenciales según tu cloud provider
          # Ejemplo para AWS:
          # aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          echo "Deployment credentials configured"

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'pull_request'
        run: |
          cd terraform
          terraform apply tfplan

      - name: Notificar despliegue
        run: |
          echo "🚀 Despliegue completado exitosamente"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"

  # --------------------------------------------------------------------------
  # Notification
  # --------------------------------------------------------------------------
  notify:
    runs-on: ubuntu-latest
    name: Notificar
    needs: [lint-and-type-check, test, build]
    if: always()
    
    steps:
      - name: Estado del workflow
        run: |
          if [ "${{ needs.lint-and-type-check.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Todos los checks pasaron correctamente"
          else
            echo "❌ Algunos checks fallaron"
            exit 1
          fi
