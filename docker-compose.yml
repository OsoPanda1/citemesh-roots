# ============================================================================
# Docker Compose - NOA-TAMV Full Stack
# ============================================================================

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # Aplicación Principal TAMV
  # --------------------------------------------------------------------------
  tamv-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tamv-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://tamv:tamv_secret@postgres:5432/tamv_core
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - tamv-network

  # --------------------------------------------------------------------------
  # Base de Datos PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tamv-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tamv
      POSTGRES_PASSWORD: tamv_secret
      POSTGRES_DB: tamv_core
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d
    networks:
      - tamv-network

  # --------------------------------------------------------------------------
  # Cache Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tamv-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - tamv-network

  # --------------------------------------------------------------------------
  # Grafana Stack (Observabilidad)
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.1
    container_name: tamv-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=tamv
      - GF_SECURITY_ADMIN_PASSWORD=tamv_admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./consciousness/grafana/dashboards:/etc/grafana/dashboards
      - ./consciousness/grafana/datasources:/etc/grafana/datasources
    depends_on:
      - prometheus
    networks:
      - tamv-network

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: tamv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./consciousness/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - tamv-network

  tempo:
    image: grafana/tempo:2.3.1
    container_name: tamv-tempo
    ports:
      - "3200:3200"
    volumes:
      - tempo-data:/tmp/tempo
      - ./consciousness/tempo:/etc/tempo
    networks:
      - tamv-network

  loki:
    image: grafana/loki:2.9.4
    container_name: tamv-loki
    ports:
      - "3100:3100"
    volumes:
      - ./consciousness/loki:/etc/loki
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - tamv-network

  # --------------------------------------------------------------------------
  # Jupyter Hub
  # --------------------------------------------------------------------------
  jupyter:
    image: quay.io/jupyterhub/jupyterhub:4.0.0
    container_name: tamv-jupyter
    ports:
      - "8000:8000"
    environment:
      - DOCKER_NETWORK_NAME=tamv-network
      - DOCKER_NOTEBOOK_IMAGE=jupyter/scipy-notebook:latest
    volumes:
      - jupyter-data:/srv/jupyterhub
      - ./laboratory/jupyter:/etc/jupyterhub
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - tamv-network

networks:
  tamv-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  grafana-data:
  prometheus-data:
  tempo-data:
  loki-data:
  jupyter-data:
